<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v10.0 | Axis Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #010409; --card: #0d1117; 
            --text: #c9d1d9; --accent: #58a6ff; --neon: #7ee787;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        
        /* Symmetry Header */
        .symmetry-header { 
            background: linear-gradient(180deg, #161b22, #0d1117); padding: 30px; border-radius: 40px; 
            margin-bottom: 25px; border: 1px solid #30363d; text-align: center;
        }
        .axis-line { height: 2px; width: 60px; background: var(--gold); margin: 10px auto; position: relative; }
        .axis-line::before, .axis-line::after { content: '●'; position: absolute; top: -7px; color: var(--gold); font-size: 10px; }
        .axis-line::before { left: -10px; } .axis-line::after { right: -10px; }

        .polar-card { 
            background: var(--card); border-radius: 35px; padding: 30px; 
            border: 1px solid rgba(88, 166, 255, 0.2); position: relative;
        }

        .axis-picker { margin-bottom: 25px; }
        label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 2px; }

        select { 
            width: 100%; padding: 18px; border-radius: 20px; background: #161b22; color: #f0f6fc; 
            border: 1px solid #30363d; font-size: 15px; outline: none; margin-top: 12px; appearance: none;
        }

        .btn-balance { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; font-size: 14px; 
            font-weight: 700; cursor: pointer; background: var(--neon); color: #010409; 
            text-transform: uppercase; transition: 0.3s;
        }

        /* Result Panel */
        .axis-panel { margin-top: 30px; display: none; animation: slideUp 0.5s ease-out; }
        .polarity-meter { display: flex; justify-content: space-between; align-items: center; background: #161b22; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .p-label { font-size: 12px; font-weight: 600; color: var(--gold); }

        .insight-text { 
            background: rgba(255,255,255,0.02); padding: 20px; border-radius: 25px; 
            border-left: 4px solid var(--neon);
        }
        .insight-text h3 { margin: 0 0 10px 0; font-size: 18px; color: #f0f6fc; }
        .insight-text p { margin: 0; font-size: 13.5px; line-height: 1.8; color: #8b949e; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="symmetry-header">
        <h1 style="margin:0; font-size: 22px;">SYMMETRY ENGINE</h1>
        <div class="axis-line"></div>
        <p style="font-size: 10px; color: #8b949e;">Firebase Real-Time Balance Check: 2026-03-05</p>
    </div>

    <div class="polar-card">
        <div class="axis-picker">
            <label>Choose Cosmic Axis</label>
            <select id="aSelect">
                <option value="1-7">1-7 Axis: Self vs Partners</option>
                <option value="2-8">2-8 Axis: Family vs Secrets</option>
                <option value="4-10">4-10 Axis: Comfort vs Authority</option>
                <option value="5-11">5-11 Axis: Talent vs Income</option>
            </select>
        </div>

        <button class="btn-balance" onclick="alignAxis()">Align Polarity ⚖️</button>

        <div id="result" class="axis-panel">
            <div class="polarity-meter">
                <span class="p-label" id="leftLabel">House X</span>
                <span style="color:#30363d;">⇄</span>
                <span class="p-label" id="rightLabel">House Y</span>
            </div>
            
            <div class="insight-text">
                <h3 id="aTitle">The Mirror Logic</h3>
                <p id="aDesc"></p>
            </div>
            
            <p style="text-align:center; font-size: 10px; color: #484f58; margin-top: 25px;">
                Planetary Axis Analysis Saved to Profile [2026-02-17]
            </p>
        </div>
    </div>
</div>

<script>
const axisDB = {
    "1-7": { l: "1st (Self)", r: "7th (Other)", t: "The Identity Axis", d: "Aapka 'Astitva' (1) tab tak poora nahi hota jab tak aap 'Samaj' (7) se nahi milte. Ye axis sikhata hai ki bina doosron ke support ke, aapki apni personality adhuri hai. Balance is key." },
    "2-8": { l: "2nd (Wealth)", r: "8th (Legacy)", t: "The Value Axis", d: "Ye axis 'Paisa' aur 'Death' ke beech ka balance hai. Jo aap kamate ho (2) aur jo aapko bina mehnat ke milta hai (8). Ye gehre raazo aur family legacy ko jorta hai." },
    "4-10": { l: "4th (Roots)", r: "10th (Fruits)", t: "The Foundation Axis", d: "Bina mazboot jadh (4th - Home/Mother) ke, koi bhi ped unchai (10th - Career) tak nahi pahunch sakta. Ghar ka sukoon hi office ki success ka petrol hai." },
    "5-11": { l: "5th (Creation)", r: "11th (Gains)", t: "The Reward Axis", d: "Aapka talent (5) tab tak bekar hai jab tak wo aapko network aur paisa (11) na de. Ye axis aapke shauk ko aapke business mein badalne ka rasta dikhati hai." }
};

function alignAxis() {
    const val = document.getElementById("aSelect").value;
    const data = axisDB[val];
    
    document.getElementById("leftLabel").innerText = data.l;
    document.getElementById("rightLabel").innerText = data.r;
    document.getElementById("aTitle").innerText = data.t;
    document.getElementById("aDesc").innerText = data.d;
    
    document.getElementById("result").style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
