<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v5.2 | Bhava Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #030712; --card: #111827; 
            --text: #f3f4f6; --accent: #00ffcc; --malefic: #ef4444; --benefic: #10b981;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        
        /* Classification Header */
        .class-header { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .tag { white-space: nowrap; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); }
        .tag.kendra { background: rgba(0, 255, 204, 0.1); color: var(--accent); }
        .tag.trikona { background: rgba(255, 215, 0, 0.1); color: var(--gold); }

        .main-card { 
            background: var(--card); border-radius: 30px; padding: 25px; 
            border: 1px solid rgba(255,215,0,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 20px; }
        label { font-size: 12px; color: #9ca3af; margin-left: 5px; display: block; margin-bottom: 8px; }

        select { 
            width: 100%; padding: 18px; border-radius: 20px; background: #1f2937; color: white; 
            border: 1px solid #374151; font-size: 15px; outline: none; appearance: none;
        }

        .btn-decode { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 14px; 
            font-weight: 700; cursor: pointer; background: var(--gold); color: #000; 
            text-transform: uppercase; margin-top: 10px;
        }

        /* Logic Display */
        .logic-panel { margin-top: 25px; display: none; animation: slideUp 0.5s ease; }
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; text-align: center; }
        .stat-card small { font-size: 10px; color: #9ca3af; display: block; }
        .stat-card b { font-size: 14px; color: var(--gold); }

        .deep-logic { 
            background: #1e293b; padding: 20px; border-radius: 22px; 
            border-left: 5px solid var(--accent);
        }
        .deep-logic h4 { margin: 0 0 10px 0; font-size: 16px; color: var(--accent); }
        .deep-logic p { margin: 0; font-size: 13.5px; line-height: 1.6; color: #d1d5db; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="class-header">
        <div class="tag kendra">Kendra (Pillars)</div>
        <div class="tag trikona">Trikona (Fortune)</div>
        <div class="tag">Upachaya (Growth)</div>
        <div class="tag">Dusthana (Challenge)</div>
    </div>

    <div class="main-card">
        <h2 style="margin:0; color:var(--gold);">House Intelligence</h2>
        <p style="font-size: 12px; color:#9ca3af; margin-bottom: 25px;">Beyond the basics: Decoding the mechanical logic of Bhavas.</p>

        <div class="input-group">
            <label>Select House to Decode</label>
            <select id="houseSelect" onchange="resetView()">
                <option value="1">1st House - Identity (Kendra/Trikona)</option>
                <option value="5">5th House - Intelligence (Trikona)</option>
                <option value="9">9th House - Fortune (Trikona)</option>
                <option value="10">10th House - Karma (Kendra/Upachaya)</option>
                <option value="11">11th House - Gains (Upachaya)</option>
            </select>
        </div>

        <button class="btn-decode" onclick="decodeHouse()">Explore Deep Logic 🔍</button>

        <div id="logicArea" class="logic-panel">
            <div class="stat-row">
                <div class="stat-card"><small>Classification</small><b id="classText">---</b></div>
                <div class="stat-card"><small>Karaka (Significator)</small><b id="karakaText">---</b></div>
            </div>
            <div class="deep-logic">
                <h4 id="titleText">House Secret</h4>
                <p id="descText"></p>
            </div>
            
            <button class="btn-decode" style="background: var(--accent); margin-top: 20px;" onclick="finalize()">
                Save to Profile & Finish 🏆
            </button>
        </div>
    </div>
</div>

<script>
const advancedData = {
    "1": {
        cl: "Dharma Trikona", 
        ka: "Sun (Surya)", 
        title: "The Seed of Destiny", 
        desc: "Ye ghar 'Self' aur 'Fortune' dono hai. Agar aapka 1st house strong hai, toh baki ke 11 gharon ka phal aapko asani se milta hai kyunki aapka 'Astitva' mazboot hai."
    },
    "5": {
        cl: "Lakshmi Sthana", 
        ka: "Jupiter (Guru)", 
        title: "Future Projection", 
        desc: "Ye 9th house se 9th ghar hai (Bhavat Bhavam). Iska matlab aapka 'Bhagya' kitna phal dega, wo aapki 'Buddhi' (5th house) tay karti hai."
    },
    "9": {
        cl: "Highest Trikona", 
        ka: "Jupiter / Sun", 
        title: "Divine Protection", 
        desc: "Ye sabse shubh ghar hai. Ye batata hai ki pichle janmo ka 'Credit' aapke is janam mein kitni madad karega. Ise 'Bhagya Sthana' kehte hain."
    },
    "10": {
        cl: "Karma Kendra", 
        ka: "Sun / Mercury", 
        title: "The Mid-Heaven", 
        desc: "Ye Upachaya ghar hai, yani waqt ke sath aapka career aur izzat badhti jayegi. Ye 7th house (Partnership) ki foundation par tika hota hai."
    },
    "11": {
        cl: "Labha Sthana", 
        ka: "Jupiter", 
        title: "Growth Engine", 
        desc: "Ye 6th house (Struggle) se 6th ghar hai. Iska matlab mushkilon se ladne ke baad jo 'Gains' milte hain, wo 11th house se aate hain."
    }
};

function decodeHouse() {
    const val = document.getElementById("houseSelect").value;
    const data = advancedData[val];
    
    document.getElementById("classText").innerText = data.cl;
    document.getElementById("karakaText").innerText = data.ka;
    document.getElementById("titleText").innerText = data.title;
    document.getElementById("descText").innerText = data.desc;
    
    document.getElementById("logicArea").style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function resetView() {
    document.getElementById("logicArea").style.display = "none";
}

function finalize() {
    console.log("Firebase Sync: Advanced Bhava Metrics Stored [2026-02-17]");
    alert("Data Synced! Aapne Astro Academy ka Basic Course pura kar liya hai. Ab aap apni Kundli decode karne ke liye taiyar hain.");
}
</script>
</body>
</html>
