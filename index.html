<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v1.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #030712; --card: #111827; 
            --text: #f3f4f6; --accent: #ffd700; --success: #10b981; 
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        
        /* Dashboard Stats */
        .dash-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .rank-badge { background: rgba(255, 215, 0, 0.1); color: var(--gold); padding: 4px 12px; border-radius: 20px; font-size: 11px; border: 1px solid var(--gold); font-weight: 600; }
        
        .progress-container { background: #1f2937; height: 6px; border-radius: 10px; margin-bottom: 30px; }
        #progress-fill { background: var(--accent); width: 15%; height: 100%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px var(--accent); border-radius: 10px; }

        /* Enhanced Lesson Card */
        .lesson-card { 
            background: var(--card); border-radius: 32px; padding: 30px; 
            border: 1px solid rgba(255,255,255,0.05); position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 40px -10px var(--accent);
            transition: box-shadow 0.5s ease;
        }
        
        h3 { margin: 0 0 20px 0; font-size: 19px; color: var(--text); }
        .element-tag { font-size: 10px; color: var(--accent); border: 1px solid var(--accent); padding: 2px 8px; border-radius: 4px; margin-left: 10px; vertical-align: middle; text-transform: uppercase; }

        select { 
            width: 100%; padding: 18px; border-radius: 18px; background: #030712; color: white; 
            border: 2px solid #374151; font-size: 16px; margin-bottom: 20px; outline: none;
        }
        select:focus { border-color: var(--accent); }

        .btn-action { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 14px; 
            font-weight: 700; cursor: pointer; background: var(--accent); color: #000; 
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-action:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Dynamic Result List */
        .result-box { margin-top: 25px; display: none; }
        .logic-row { 
            background: rgba(255,255,255,0.02); padding: 16px; border-radius: 20px; 
            margin-bottom: 12px; border-left: 4px solid var(--accent);
            animation: slideIn 0.5s ease forwards; opacity: 0;
        }
        .logic-row b { display: block; font-size: 14px; color: #fff; margin-bottom: 4px; }
        .logic-row p { font-size: 12px; color: #9ca3af; margin: 0; line-height: 1.5; }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(-10px); } 
            to { opacity: 1; transform: translateX(0); } 
        }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .nav-footer { margin-top: 25px; display: none; text-align: center; }
        .next-link { color: var(--success); text-decoration: none; font-weight: 600; font-size: 14px; border-bottom: 1px solid var(--success); padding-bottom: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="dash-header">
        <div style="font-weight: bold; font-size: 20px;">🎓 Academy</div>
        <div class="rank-badge">NOVICE - LVL 1</div>
    </div>
    
    <div class="progress-container"><div id="progress-fill"></div></div>

    <div class="lesson-card" id="main-card">
        <h3>Intelligence <span id="el-tag" class="element-tag">Core</span></h3>
        
        <select id="p-select" onchange="syncUI()">
            <option value="Sun" data-color="#FFD700" data-el="Soul">Sun (Surya) ☀️</option>
            <option value="Moon" data-color="#A5F3FC" data-el="Mind">Moon (Chandra) 🌙</option>
            <option value="Mars" data-color="#FF4D4D" data-el="Energy">Mars (Mangal) 🔥</option>
            <option value="Mercury" data-color="#4ADE80" data-el="Speech">Mercury (Budh) ✍️</option>
            <option value="Jupiter" data-color="#FBBF24" data-el="Wisdom">Jupiter (Guru) 🎓</option>
            <option value="Venus" data-color="#F472B6" data-el="Art">Venus (Shukra) ✨</option>
            <option value="Saturn" data-color="#6366F1" data-el="Karma">Saturn (Shani) ⚖️</option>
            <option value="Rahu" data-color="#94A3B8" data-el="Obsession">Rahu 🎭</option>
            <option value="Ketu" data-color="#8B5CF6" data-el="Moksha">Ketu 🧘</option>
        </select>
        
        <button class="btn-action" onclick="runAnalysis()">Analyze Logic ✨</button>
        
        <div id="results" class="result-box"></div>
        <div id="footer" class="nav-footer">
            <a href="#" class="next-link">Unlock Lesson 2: The 12 Houses ➔</a>
        </div>
    </div>
</div>

<script>
const data = {
    "Sun": [{b: "The King Nature", p: "Rules the ego and authority; naturally wants to lead others."}, {b: "Vital Health", p: "Controls the heart and eyes—the vital sources of life."}],
    "Moon": [{b: "Emotional Anchor", p: "Rules your feelings; shifts like the tides of the sea."}, {b: "Motherly Care", p: "Governs food, nourishment, and home comfort."}],
    "Mars": [{b: "Raw Courage", p: "The fuel for action; rules blood, heat, and competition."}, {b: "Problem Solver", p: "Loves tools and logic to fix physical things."}],
    "Mercury": [{b: "Mental Agility", p: "The bridge between ideas and words; rules clever speech."}, {b: "Trading Spirit", p: "Master of numbers and making profitable deals."}],
    "Jupiter": [{b: "Great Benefic", p: "Brings expansion; what Jupiter touches, it grows."}, {b: "The Counsel", p: "Rules law, dharma, and deep philosophical truths."}],
    "Venus": [{b: "Luxury & Love", p: "Rules pleasure and refinement; loves high-vibration art."}, {b: "Relationship Guru", p: "Governs the harmony between two different souls."}],
    "Saturn": [{b: "Master of Time", p: "Rules structure and boundaries; teaches through delay."}, {b: "Grounding Force", p: "Connects you to reality, hard work, and the elderly."}],
    "Rahu": [{b: "Future Vision", p: "Master of the 'unknown' and foreign technology."}, {b: "The Hunger", p: "Creates an unquenchable desire for more power."}],
    "Ketu": [{b: "The Spiritual Exit", p: "Rules detachment and letting go of the material world."}, {b: "Ancient Wisdom", p: "Connects to past life skills and deep intuition."}]
};

let lastSelected = "";

function syncUI() {
    const sel = document.getElementById("p-select");
    const color = sel.options[sel.selectedIndex].getAttribute('data-color');
    const element = sel.options[sel.selectedIndex].getAttribute('data-el');
    
    document.documentElement.style.setProperty('--accent', color);
    document.getElementById("el-tag").innerText = element;
}

function runAnalysis() {
    const val = document.getElementById("p-select").value;
    const box = document.getElementById("results");
    const card = document.getElementById("main-card");

    if(val === lastSelected) {
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 400);
        return;
    }

    lastSelected = val;
    box.innerHTML = "";
    box.style.display = "block";
    
    data[val].forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'logic-row';
        row.style.animationDelay = `${i * 0.1}s`;
        row.innerHTML = `<b>${item.b}</b><p>${item.p}</p>`;
        box.appendChild(row);
    });

    document.getElementById("progress-fill").style.width = "75%";
    document.getElementById("footer").style.display = "block";
}
</script>
</body>
</html>
