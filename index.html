<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v1.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #0a0c14; --card: #161a29; 
            --text: #f3f4f6; --accent: #ffd700; --active: #00ffcc;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; }
        
        /* Tactical Progress */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .live-dot { height: 8px; width: 8px; background: var(--active); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px var(--active); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* The Tactical Card */
        .lesson-card { 
            background: var(--card); border-radius: 35px; padding: 30px; 
            box-shadow: 10px 10px 20px #05060a, -5px -5px 15px rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* 3D Selector */
        .custom-select-wrap { position: relative; margin-bottom: 25px; }
        select { 
            width: 100%; padding: 18px; border-radius: 20px; background: #111421; color: white; 
            border: none; font-size: 16px; appearance: none; outline: none;
            box-shadow: inset 4px 4px 8px #05060a, inset -2px -2px 6px rgba(255,255,255,0.05);
        }

        /* The Haptic Button */
        .btn-haptic { 
            width: 100%; padding: 20px; border-radius: 22px; border: none; font-size: 15px; 
            font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            background: linear-gradient(145deg, var(--accent), #b8860b);
            color: #000; transition: 0.15s cubic-bezier(0.2, 0, 0.2, 1);
            box-shadow: 0 8px 0 #8b6d00, 0 15px 20px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }
        .btn-haptic:active { 
            transform: translateY(4px);
            box-shadow: 0 4px 0 #8b6d00, 0 5px 10px rgba(0,0,0,0.4);
        }
        .btn-haptic::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg); transition: 0.3s;
        }

        /* Result Animation */
        .result-panel { margin-top: 30px; display: none; }
        .data-bit { 
            background: #111421; padding: 20px; border-radius: 22px; margin-bottom: 12px;
            box-shadow: inset 2px 2px 5px #05060a; border-left: 4px solid var(--accent);
            animation: slideIn 0.4s ease-out forwards;
        }
        .data-bit b { color: var(--accent); display: block; font-size: 12px; margin-bottom: 5px; }
        .data-bit p { margin: 0; font-size: 14px; line-height: 1.4; opacity: 0.9; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span style="font-size: 12px; font-weight: 600;"><span class="live-dot"></span>SYSTEM ACTIVE</span>
        <span style="font-size: 12px; color: var(--gold);">V1.8 TACTILE</span>
    </div>

    <div class="lesson-card">
        <h2 style="margin: 0 0 20px 0; font-size: 22px;">Planet Core</h2>
        
        <div class="custom-select-wrap">
            <select id="p-core" onchange="hapticFlash()">
                <option value="Sun">Sun (Surya) ☀️</option>
                <option value="Moon">Moon (Chandra) 🌙</option>
                <option value="Mars">Mars (Mangal) 🔥</option>
                <option value="Mercury">Mercury (Budh) ✍️</option>
                <option value="Jupiter">Jupiter (Guru) 🎓</option>
                <option value="Venus">Venus (Shukra) ✨</option>
                <option value="Saturn">Saturn (Shani) ⚖️</option>
                <option value="Rahu">Rahu 🎭</option>
                <option value="Ketu">Ketu 🧘</option>
            </select>
        </div>
        
        <button class="btn-haptic" onclick="triggerLogic()">Analyze Logic</button>
        
        <div id="panel" class="result-panel">
            <div class="data-bit">
                <b>Primary Archetype</b>
                <p id="arch-val">-</p>
            </div>
            <div class="data-bit" style="animation-delay: 0.1s;">
                <b>System Logic</b>
                <p id="logic-val">-</p>
            </div>
        </div>
    </div>
</div>

<script>
const library = {
    "Sun": ["The King", "Rules the physical heart and spiritual ego—the center of all existence."],
    "Moon": ["The Queen", "Rules the mind and emotions; shifts focus based on inner needs."],
    "Mars": ["The Commander", "Rules the blood and survival drive; wins through direct action."],
    "Mercury": ["The Prince", "Rules calculations and speech; wins through clever strategy."],
    "Jupiter": ["The Mentor", "Rules wisdom and expansion; grows through ethics and faith."],
    "Venus": ["The Artist", "Rules luxury and attraction; harmonizes through aesthetic beauty."],
    "Saturn": ["The Architect", "Rules time and structure; builds through discipline and delay."],
    "Rahu": ["The Outsider", "Rules innovation and obsession; seeks the extraordinary."],
    "Ketu": ["The Sage", "Rules intuition and detachment; seeks the spiritual source."]
};

function hapticFlash() {
    // Visual feedback for select change
    const card = document.querySelector('.lesson-card');
    card.style.borderColor = 'var(--accent)';
    setTimeout(() => card.style.borderColor = 'rgba(255,255,255,0.05)', 300);
}

function triggerLogic() {
    const val = document.getElementById("p-core").value;
    document.getElementById("arch-val").innerText = library[val][0];
    document.getElementById("logic-val").innerText = library[val][1];
    
    const panel = document.getElementById("panel");
    panel.style.display = "block";
    
    // Smooth reset for animation
    panel.classList.remove('result-panel');
    void panel.offsetWidth; 
    panel.classList.add('result-panel');
}
</script>
</body>
</html>
