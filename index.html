<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v1.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #05070a; --card: #111827; 
            --text: #f3f4f6; --accent: #ffd700; --success: #00ffcc; 
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 480px; margin: auto; }
        
        /* Header & Progress */
        header { text-align: center; margin: 20px 0; }
        .stats-bar { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; color: var(--gold); text-transform: uppercase; font-weight: bold; }
        .progress-wrap { background: #1f2937; height: 6px; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #progress-fill { background: var(--accent); width: 10%; height: 100%; transition: 1s ease; box-shadow: 0 0 10px var(--accent); }

        /* Lesson Card */
        .lesson-card { background: var(--card); border-radius: 28px; padding: 25px; border: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden; }
        .lesson-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,215,0,0.03) 0%, transparent 70%); pointer-events: none; }
        
        h3 { margin-top: 0; font-size: 18px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        
        select { 
            width: 100%; padding: 16px; border-radius: 16px; background: #1f2937; color: white; 
            border: 2px solid #374151; font-size: 16px; margin-bottom: 15px; cursor: pointer; transition: 0.3s;
        }
        select:focus { border-color: var(--accent); }

        .btn-main { 
            width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 14px; 
            font-weight: 700; cursor: pointer; background: var(--accent); color: #000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Results Dynamic Grid */
        .result-box { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 25px; display: none; }
        .trait-pill { 
            background: rgba(255,255,255,0.04); padding: 15px; border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.05); animation: popIn 0.5s ease forwards; opacity: 0;
        }
        .trait-pill b { display: block; color: var(--accent); font-size: 15px; margin-bottom: 4px; }
        .trait-pill span { font-size: 12px; color: #9ca3af; line-height: 1.4; display: block; }

        @keyframes popIn { 
            0% { opacity: 0; transform: scale(0.9); } 
            100% { opacity: 1; transform: scale(1); } 
        }

        .next-step { 
            background: #00ffcc; color: #000; padding: 18px; border-radius: 16px; 
            text-align: center; text-decoration: none; font-weight: bold; margin-top: 25px; 
            display: none; animation: fadeIn 1s;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>🎓 Astro Academy</h2>
        <div class="stats-bar"><span>EXP: 150</span> <span>Rank: Novice</span></div>
        <div class="progress-wrap"><div id="progress-fill"></div></div>
    </header>

    <div class="lesson-card">
        <h3>✨ Planet Intelligence</h3>
        <select id="planet-select" onchange="applyVibe()">
            <option value="Sun" data-color="#FFD700">Sun (Surya) ☀️</option>
            <option value="Moon" data-color="#A5F3FC">Moon (Chandra) 🌙</option>
            <option value="Mars" data-color="#FF4D4D">Mars (Mangal) 🔥</option>
            <option value="Mercury" data-color="#4ADE80">Mercury (Budh) ✍️</option>
            <option value="Jupiter" data-color="#FBBF24">Jupiter (Guru) 🎓</option>
            <option value="Venus" data-color="#F472B6">Venus (Shukra) ✨</option>
            <option value="Saturn" data-color="#6366F1">Saturn (Shani) ⚖️</option>
            <option value="Rahu" data-color="#94A3B8">Rahu 🎭</option>
            <option value="Ketu" data-color="#8B5CF6">Ketu 🧘</option>
        </select>
        
        <button class="btn-main" onclick="revealLogic()">Unlock Knowledge 🔑</button>
        
        <div id="result-grid" class="result-box"></div>
        <a href="#" id="next-btn" class="next-step">Mastered? Go to Houses ➔</a>
    </div>
</div>

<script>
const library = {
    "Sun": [
        {t: "The King Archetype", d: "Naturally leads because the Sun is the center of the solar system."},
        {t: "Bone Vitality", d: "Rules the skeletal system; strong Sun gives strong posture."},
        {t: "Divine Discipline", d: "Never late, never skips a day—Sun creates the daily rhythm."}
    ],
    "Moon": [
        {t: "Emotional Tides", d: "Rules the mind and mood, just like it pulls the ocean tides."},
        {t: "Nurturing Heart", d: "Represents the Mother/Queen; deep empathy and care."},
        {t: "Fastest Mover", d: "Changes signs every 2.5 days, causing frequent mood shifts."}
    ],
    "Mars": [
        {t: "The Inner Warrior", d: "Drives energy, muscles, and the will to compete and win."},
        {t: "Brotherhood", d: "Governs siblings and comrades-in-arms."},
        {t: "Technical Fire", d: "Rules engineers and surgeons who use tools/heat."}
    ],
    "Mercury": [
        {t: "The Messenger", d: "Rules communication, writing, and logical calculations."},
        {t: "Dual Nature", d: "Adaptable and flexible; loves variety and learning."},
        {t: "Commercial Mind", d: "The master of trade, business, and networking."}
    ],
    "Jupiter": [
        {t: "Divine Wisdom", d: "The Teacher (Guru) who brings expansion and luck."},
        {t: "Wealth & Gold", d: "Rules abundance and the growth of assets."},
        {t: "Spiritual Faith", d: "Connects the soul to higher ethics and religion."}
    ],
    "Venus": [
        {t: "Artistic Soul", d: "Rules beauty, luxury, and all creative expressions."},
        {t: "Harmony in Love", d: "Governs relationships and the ability to attract."},
        {t: "The Good Life", d: "Loves perfumes, fashion, and sophisticated comfort."}
    ],
    "Saturn": [
        {t: "The Taskmaster", d: "Teaches through delay, hard work, and discipline."},
        {t: "Ancient Roots", d: "Governs old age, tradition, and long-term structures."},
        {t: "Justice & Karma", d: "The judge who delivers results based on effort."}
    ],
    "Rahu": [
        {t: "Digital Genius", d: "Master of technology, innovation, and foreign ideas."},
        {t: "Obsessive Drive", d: "Creates an 'out of the box' hunger for success."},
        {t: "Illusionist", d: "Rules smoke, mirrors, photography, and film."}
    ],
    "Ketu": [
        {t: "The Monk", d: "Drives detachment, meditation, and spiritual liberation."},
        {t: "Hidden Intuition", d: "Master of deep research and 'gut feelings'."},
        {t: "Deep Coder", d: "Focuses on the roots and secrets of any subject."}
    ]
};

function applyVibe() {
    const sel = document.getElementById("planet-select");
    const color = sel.options[sel.selectedIndex].getAttribute('data-color');
    document.documentElement.style.setProperty('--accent', color);
}

function revealLogic() {
    const val = document.getElementById("planet-select").value;
    const grid = document.getElementById("result-grid");
    grid.innerHTML = "";
    grid.style.display = "grid";
    
    library[val].forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'trait-pill';
        card.style.animationDelay = `${i * 0.1}s`;
        card.innerHTML = `<b>${item.t}</b><span>${item.d}</span>`;
        grid.appendChild(card);
    });

    document.getElementById("progress-fill").style.width = "45%";
    document.getElementById("next-btn").style.display = "block";
}
</script>
</body>
</html>
