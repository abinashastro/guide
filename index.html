<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v1.5 | Master Archetypes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #05070a; --card: #111827; 
            --text: #f3f4f6; --accent: #ffd700; --success: #00ffcc; 
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 480px; margin: auto; }
        
        /* Progress & XP */
        .header-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; }
        .progress-wrap { background: #1f2937; height: 4px; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #progress-fill { background: var(--accent); width: 30%; height: 100%; transition: 1s ease; box-shadow: 0 0 20px var(--accent); }

        /* The Animated Card */
        .lesson-card { 
            background: var(--card); border-radius: 28px; padding: 30px; 
            border: 1px solid rgba(255,255,255,0.08); position: relative;
            transition: 0.5s; box-shadow: 0 0 30px -10px var(--accent);
        }
        .lesson-card.pulse { animation: cardPulse 2s infinite; }
        @keyframes cardPulse { 
            0% { box-shadow: 0 0 30px -15px var(--accent); } 
            50% { box-shadow: 0 0 50px -10px var(--accent); } 
            100% { box-shadow: 0 0 30px -15px var(--accent); } 
        }
        
        h3 { margin-top: 0; font-size: 20px; color: #fff; display: flex; align-items: center; justify-content: space-between; }
        .role-tag { font-size: 11px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; color: var(--accent); }

        select { 
            width: 100%; padding: 16px; border-radius: 16px; background: #1f2937; color: white; 
            border: 2px solid #374151; font-size: 16px; margin: 20px 0; cursor: pointer;
        }

        .btn-analyze { 
            width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 14px; 
            font-weight: 700; cursor: pointer; background: var(--accent); color: #000; 
            text-transform: uppercase; transition: 0.3s;
        }

        /* Results Display */
        .result-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 30px; display: none; }
        .logic-pill { 
            background: rgba(255,255,255,0.03); padding: 18px; border-radius: 20px; 
            border-left: 4px solid var(--accent); animation: pop 0.4s ease forwards;
        }
        .pill-label { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .pill-text { font-size: 14px; line-height: 1.5; color: #cbd5e1; }

        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .next-btn { 
            display: none; background: #00ffcc; color: #000; padding: 18px; border-radius: 16px; 
            text-align: center; text-decoration: none; font-weight: bold; margin-top: 25px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-meta"><span>COURSE: 1.5</span> <span>XP: 450</span></div>
    <div class="progress-wrap"><div id="progress-fill"></div></div>

    <div class="lesson-card" id="card">
        <h3>Intelligence <span id="role" class="role-tag">The Archetype</span></h3>
        
        <select id="p-select" onchange="syncUI()">
            <option value="Sun" data-c="#FFD700" data-r="The CEO">Sun (Surya) ☀️</option>
            <option value="Moon" data-c="#A5F3FC" data-r="The Healer">Moon (Chandra) 🌙</option>
            <option value="Mars" data-c="#FF4D4D" data-r="The Commander">Mars (Mangal) 🔥</option>
            <option value="Mercury" data-c="#4ADE80" data-r="The Architect">Mercury (Budh) ✍️</option>
            <option value="Jupiter" data-c="#FBBF24" data-r="The Mentor">Jupiter (Guru) 🎓</option>
            <option value="Venus" data-c="#F472B6" data-r="The Stylist">Venus (Shukra) ✨</option>
            <option value="Saturn" data-c="#6366F1" data-r="The Judge">Saturn (Shani) ⚖️</option>
            <option value="Rahu" data-c="#94A3B8" data-r="The Disruptor">Rahu 🎭</option>
            <option value="Ketu" data-c="#8B5CF6" data-r="The Mystic">Ketu 🧘</option>
        </select>
        
        <button class="btn-analyze" onclick="analyze()">Decode Archetype 🔓</button>
        
        <div id="results" class="result-grid"></div>
        <a href="#" id="next" class="next-btn">Lesson 2: House Systems ➔</a>
    </div>
</div>

<script>
const data = {
    "Sun": {logic: "Your soul's drive. It rules authority because it is the gravity that holds life together.", career: "Politics, Leadership, Medicine, and Management."},
    "Moon": {logic: "Your emotional filter. It rules the mind because perceptions change like phases of the moon.", career: "Psychology, Culinary Arts, Nursing, and Hospitality."},
    "Mars": {logic: "Your survival instinct. It rules muscles and heat because energy requires friction.", career: "Engineering, Defense, Sports, and Surgery."},
    "Mercury": {logic: "Your analytical bridge. It rules speech because ideas need a medium to travel.", career: "IT, Content Creation, Trade, and Journalism."},
    "Jupiter": {logic: "Your growth engine. It rules wisdom because expansion requires a broad perspective.", career: "Teaching, Law, Finance, and Spirituality."},
    "Venus": {logic: "Your value system. It rules luxury because harmony is found in refined aesthetics.", career: "Fashion, Entertainment, Design, and Luxury Sales."},
    "Saturn": {logic: "Your structural limits. It rules time because mastery requires consistent repetition.", career: "Real Estate, Mining, Law Enforcement, and Long-term Research."},
    "Rahu": {logic: "Your obsession. It rules innovation because it seeks what is 'not yet achieved'.", career: "Software, AI, Foreign Trade, and Photography."},
    "Ketu": {logic: "Your spiritual exit. It rules intuition because it bypasses the material world.", career: "Deep Coding, Meditation, Research, and Metaphysics."}
};

function syncUI() {
    const s = document.getElementById("p-select");
    const color = s.options[s.selectedIndex].getAttribute('data-c');
    const role = s.options[s.selectedIndex].getAttribute('data-r');
    
    document.documentElement.style.setProperty('--accent', color);
    document.getElementById("role").innerText = role;
    document.getElementById("card").classList.add('pulse');
}

function analyze() {
    const val = document.getElementById("p-select").value;
    const res = document.getElementById("results");
    res.innerHTML = "";
    res.style.display = "grid";
    
    res.innerHTML = `
        <div class="logic-pill">
            <span class="pill-label">The Logical Why</span>
            <div class="pill-text">${data[val].logic}</div>
        </div>
        <div class="logic-pill" style="animation-delay: 0.1s">
            <span class="pill-label">Career Resonance</span>
            <div class="pill-text">${data[val].career}</div>
        </div>
    `;

    document.getElementById("progress-fill").style.width = "100%";
    document.getElementById("next").style.display = "block";
}
</script>
</body>
</html>
