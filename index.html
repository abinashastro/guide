<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v1.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #030712; --card: #111827; 
            --text: #f3f4f6; --accent: #ffd700; --success: #10b981; --warning: #f59e0b;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        
        /* Leveling System */
        .xp-header { display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
        .progress-bar { background: #1f2937; height: 6px; border-radius: 10px; margin-bottom: 30px; overflow: hidden; border: 1px solid #374151; }
        #fill { background: var(--accent); width: 85%; height: 100%; transition: 1s ease; box-shadow: 0 0 15px var(--accent); }

        /* Neon Lesson Card */
        .lesson-card { 
            background: var(--card); border-radius: 32px; padding: 30px; 
            border: 1px solid rgba(255,255,255,0.05); position: relative;
            box-shadow: 0 0 40px -15px var(--accent); transition: 0.5s;
        }
        
        h3 { margin: 0 0 20px 0; font-size: 20px; color: #fff; letter-spacing: -0.5px; }
        
        select { 
            width: 100%; padding: 18px; border-radius: 18px; background: #030712; color: white; 
            border: 2px solid #374151; font-size: 16px; margin-bottom: 20px; outline: none;
        }

        .btn-strike { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 14px; 
            font-weight: 700; cursor: pointer; background: var(--accent); color: #000; 
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-strike:active { transform: scale(0.96); }

        /* Power Metrics */
        .metrics-grid { display: none; margin-top: 30px; animation: fadeIn 0.6s ease; }
        .metric-card { 
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; 
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .label { font-size: 10px; text-transform: uppercase; color: #9ca3af; display: block; margin-bottom: 4px; }
        .val { font-size: 15px; font-weight: 600; color: #fff; }
        .logic-note { font-size: 12px; color: var(--warning); margin-top: 5px; font-style: italic; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .next-step { display: none; text-align: center; margin-top: 25px; color: var(--success); font-weight: bold; font-size: 14px; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="xp-header"><span>Lesson 1.7: Dignity</span> <span>Rank: Adept</span></div>
    <div class="progress-bar"><div id="fill"></div></div>

    <div class="lesson-card" id="card">
        <h3>Planetary Strength</h3>
        
        <select id="p-select" onchange="syncUI()">
            <option value="Sun" data-c="#FFD700" data-u="Aries" data-n="Libra">Sun (Surya) ☀️</option>
            <option value="Moon" data-c="#A5F3FC" data-u="Taurus" data-n="Scorpio">Moon (Chandra) 🌙</option>
            <option value="Mars" data-c="#FF4D4D" data-u="Capricorn" data-n="Cancer">Mars (Mangal) 🔥</option>
            <option value="Mercury" data-c="#4ADE80" data-u="Virgo" data-n="Pisces">Mercury (Budh) ✍️</option>
            <option value="Jupiter" data-c="#FBBF24" data-u="Cancer" data-n="Capricorn">Jupiter (Guru) 🎓</option>
            <option value="Venus" data-c="#F472B6" data-u="Pisces" data-n="Virgo">Venus (Shukra) ✨</option>
            <option value="Saturn" data-c="#6366F1" data-u="Libra" data-n="Aries">Saturn (Shani) ⚖️</option>
            <option value="Rahu" data-c="#94A3B8" data-u="Taurus/Gemini" data-n="Scorpio/Sag">Rahu 🎭</option>
            <option value="Ketu" data-c="#8B5CF6" data-u="Scorpio/Sag" data-n="Taurus/Gemini">Ketu 🧘</option>
        </select>
        
        <button class="btn-strike" onclick="showDignity()">Calculate Strength ⚡</button>
        
        <div id="metrics" class="metrics-grid">
            <div class="metric-card">
                <span class="label">Peak Performance (Exaltation)</span>
                <span id="ucha" class="val">-</span>
                <div id="ucha-logic" class="logic-note"></div>
            </div>
            <div class="metric-card">
                <span class="label">Lowest Energy (Debilitation)</span>
                <span id="neecha" class="val">-</span>
                <div id="neecha-logic" class="logic-note"></div>
            </div>
        </div>

        <a id="final-nav" class="next-step" onclick="alert('Congratulations! Lesson 1 Complete. Preparing House Systems...')">
            COMPLETED LESSON 1: THE PLANETS ➔
        </a>
    </div>
</div>

<script>
const strengthLogic = {
    "Sun": {u: "In Aries, the King finds his power to lead new beginnings.", n: "In Libra, the King loses his ego trying to please everyone."},
    "Moon": {u: "In Taurus, emotions are stable and grounded.", n: "In Scorpio, emotions are too deep, intense, and unstable."},
    "Mars": {u: "In Capricorn, the soldier has discipline and a goal.", n: "In Cancer, the soldier gets too emotional and loses focus."},
    "Mercury": {u: "In Virgo, logic is at its sharpest and most detailed.", n: "In Pisces, logic gets lost in dreams and imagination."},
    "Jupiter": {u: "In Cancer, wisdom is used for nurturing and protection.", n: "In Capricorn, wisdom becomes too cold and business-like."},
    "Venus": {u: "In Pisces, love becomes spiritual and unconditional.", n: "In Virgo, love becomes too critical and analytical."},
    "Saturn": {u: "In Libra, discipline is used for justice and balance.", n: "In Aries, discipline is lost to impulsive anger."},
    "Rahu": {u: "Thrives where material gains and luxury are stable.", n: "Fails where intense emotional secrets are required."},
    "Ketu": {u: "Powerful in signs of deep research and mystery.", n: "Weak in signs of worldly pleasure and comfort."}
};

function syncUI() {
    const sel = document.getElementById("p-select");
    const color = sel.options[sel.selectedIndex].getAttribute('data-c');
    document.documentElement.style.setProperty('--accent', color);
}

function showDignity() {
    const val = document.getElementById("p-select").value;
    const sel = document.getElementById("p-select");
    
    document.getElementById("ucha").innerText = sel.options[sel.selectedIndex].getAttribute('data-u');
    document.getElementById("neecha").innerText = sel.options[sel.selectedIndex].getAttribute('data-n');
    
    document.getElementById("ucha-logic").innerText = "Logic: " + strengthLogic[val].u;
    document.getElementById("neecha-logic").innerText = "Logic: " + strengthLogic[val].n;
    
    document.getElementById("metrics").style.display = "block";
    document.getElementById("fill").style.width = "100%";
    document.getElementById("final-nav").style.display = "block";
}
</script>
</body>
</html>
