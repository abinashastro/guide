<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v7.4 | Drishti Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #03040a; --card: #0f172a; 
            --text: #f1f5f9; --accent: #10b981; --warn: #f43f5e;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        
        /* Vision Tracker */
        .vision-hub { 
            background: #1e293b; padding: 20px; border-radius: 30px; 
            margin-bottom: 25px; border: 1px dashed var(--gold);
            text-align: center;
        }
        .vision-hub b { color: var(--gold); letter-spacing: 2px; font-size: 12px; }

        .eye-card { 
            background: var(--card); border-radius: 35px; padding: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative;
        }

        .lens-select { background: #0f172a; padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid #334155; }
        label { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; display: block; }

        select { 
            width: 100%; padding: 16px; border-radius: 18px; background: #1e293b; color: white; 
            border: 1px solid #475569; font-size: 14px; outline: none; margin-bottom: 15px;
        }

        .btn-focus { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 13px; 
            font-weight: 700; cursor: pointer; background: var(--gold); color: #000; 
            text-transform: uppercase;
        }

        /* Aspect Logic Result */
        .aspect-panel { margin-top: 30px; display: none; animation: zoomIn 0.4s ease; }
        .aspect-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        
        .stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 18px; text-align: center; }
        .stat-box span { font-size: 9px; color: #94a3b8; display: block; }
        .stat-box b { font-size: 14px; color: var(--accent); }

        .insight-box { 
            background: linear-gradient(145deg, #1e293b, #0f172a); padding: 20px; 
            border-radius: 25px; border-right: 4px solid var(--gold);
        }
        .insight-box h4 { margin: 0 0 10px 0; color: var(--gold); font-size: 16px; }
        .insight-box p { margin: 0; font-size: 13px; line-height: 1.6; color: #cbd5e1; }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <div class="vision-hub">
        <b>Drishti-Log: Firebase Sync Active</b>
        <p style="font-size: 10px; margin: 5px 0 0 0; color: #64748b;">Tracking Planetary Gaze for March 2026</p>
    </div>

    <div class="eye-card">
        <h2 style="margin:0 0 5px 0;">Visionary Analysis</h2>
        <p style="color:#94a3b8; font-size: 13px; margin-bottom: 25px;">How planets influence houses from a distance.</p>
        
        <div class="lens-select">
            <label>Select Master Planet</label>
            <select id="planetSelect">
                <option value="Jupiter">Jupiter (Guru) - Blessing Gaze</option>
                <option value="Saturn">Saturn (Shani) - Duty Gaze</option>
                <option value="Mars">Mars (Mangal) - Protective Gaze</option>
                <option value="Rahu">Rahu (Dragon Head) - Obsessive Gaze</option>
            </select>
        </div>
        
        <button class="btn-focus" onclick="showVision()">Activate Lens 👁️</button>
        
        <div id="result" class="aspect-panel">
            <div class="aspect-grid">
                <div class="stat-box"><span>Aspect Type</span><b id="typeText">---</b></div>
                <div class="stat-box"><span>Target Houses</span><b id="targetText">---</b></div>
            </div>
            
            <div class="insight-box">
                <h4 id="titleText">Gaze Power</h4>
                <p id="descText"></p>
            </div>
            
            <p style="text-align:center; font-size: 11px; margin-top: 20px; color: var(--accent);">
                Analysis Stored in [2026-02-17] Database Ledger
            </p>
        </div>
    </div>
</div>

<script>
const visionData = {
    "Jupiter": {
        type: "Amrit (Nectar)",
        targets: "5th, 7th, 9th",
        title: "The Golden Shield",
        desc: "Guru ki drishti Ganga jal ki tarah hai. Ye jahan bhi padti hai wahan ke 'Dosha' (problems) ko dho deti hai. Agar Guru 9th house ko dekhe, toh luck hamesha aapke sath rehta hai."
    },
    "Saturn": {
        type: "Karma (Discipline)",
        targets: "3rd, 7th, 10th",
        title: "The Architect's Rule",
        desc: "Shani jahan dekhta hai wahan emotion nahi, result mangta hai. 3rd aspect aapko mehnat karwayega, 10th aspect aapko career mein authority dega, par discipline ke baad."
    },
    "Mars": {
        type: "Shakti (Protection)",
        targets: "4th, 7th, 8th",
        title: "The Security Guard",
        desc: "Mangal 4th drishti se ghar ki raksha karta hai. 8th aspect se ye sudden transformation lata hai. Ye drishti 'Hot' hoti hai, isliye ye us ghar mein energy bhar deti hai."
    },
    "Rahu": {
        type: "Maya (Illusion)",
        targets: "5th, 7th, 9th",
        title: "The Smoke Screen",
        desc: "Rahu ki drishti obsessive hoti hai. Jahan ye dekhta hai, wahan aapko 'Extraordinary' result chahiye hote hain. Ye unconventional success dilati hai."
    }
};

function showVision() {
    const planet = document.getElementById("planetSelect").value;
    const data = visionData[planet];
    
    document.getElementById("typeText").innerText = data.type;
    document.getElementById("targetText").innerText = data.targets;
    document.getElementById("titleText").innerText = data.title;
    document.getElementById("descText").innerText = data.desc;
    
    document.getElementById("result").style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
