<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v8.0 | Vitality Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #020617; --card: #1e293b; 
            --text: #f8fafc; --accent: #38bdf8; --power: #22c55e;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        
        /* Vitality Dashboard */
        .dash-header { 
            background: linear-gradient(135deg, #334155, #0f172a); padding: 25px; border-radius: 30px; 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }
        .power-meter { 
            height: 8px; width: 100%; background: #000; border-radius: 10px; margin: 15px 0; overflow: hidden;
        }
        #powerFill { height: 100%; width: 0%; background: var(--power); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        .age-card { 
            background: var(--card); border-radius: 35px; padding: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .input-group { background: #0f172a; padding: 20px; border-radius: 25px; margin-bottom: 20px; }
        label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        select { 
            width: 100%; padding: 16px; border-radius: 18px; background: #1e293b; color: white; 
            border: 1px solid #334151; font-size: 14px; outline: none; margin-top: 10px;
        }

        .btn-analyze { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 14px; 
            font-weight: 700; cursor: pointer; background: var(--gold); color: #000; 
            text-transform: uppercase; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        /* Results Display */
        .result-panel { margin-top: 30px; display: none; animation: fadeIn 0.5s ease; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .badge { background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; }

        .insight-box { 
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; 
            border-left: 5px solid var(--gold);
        }
        .insight-box h4 { margin: 0 0 8px 0; color: var(--gold); }
        .insight-box p { margin: 0; font-size: 13.5px; line-height: 1.6; color: #cbd5e1; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="dash-header">
        <b style="font-size: 14px; color: var(--gold);">VITALITY INDEX v8.0</b>
        <div class="power-meter"><div id="powerFill"></div></div>
        <span id="powerLabel" style="font-size: 10px; color: #94a3b8;">Select Degree to Calculate Potency</span>
    </div>

    <div class="age-card">
        <div class="input-group">
            <label>Current Degree Range</label>
            <select id="degreeSelect">
                <option value="bal" data-p="25">0° - 6°: Bal Avastha (Infant)</option>
                <option value="kumar" data-p="50">6° - 12°: Kumar Avastha (Teenager)</option>
                <option value="yuva" data-p="100">12° - 18°: Yuva Avastha (Young King)</option>
                <option value="vridh" data-p="20">18° - 24°: Vridh Avastha (Old Sage)</option>
                <option value="mrit" data-p="5">24° - 30°: Mrit Avastha (Exhausted)</option>
            </select>
        </div>

        <button class="btn-analyze" onclick="calculateVitality()">Check Power Score 💪</button>

        <div id="result" class="result-panel">
            <div class="stat-row">
                <div class="badge" id="statusBadge">ACTIVE</div>
                <div class="badge" style="background:rgba(34, 197, 94, 0.1); color:var(--power);" id="percentBadge">100% Potential</div>
            </div>
            
            <div class="insight-box">
                <h4 id="resTitle">Calculating...</h4>
                <p id="resDesc"></p>
            </div>
            
            <button class="btn-analyze" style="background: var(--accent); margin-top: 25px;" onclick="saveProgress()">
                Sync Degree Data to Firebase 🏆
            </button>
        </div>
    </div>
</div>

<script>
const degreeInfo = {
    "bal": { t: "The Sleeping Giant", d: "Grah ke paas 'Gyan' hai par 'Bal' (strength) kam hai. Ye seed ki tarah hai, ise phal dene mein waqt lagta hai. Remedies zaroori hain." },
    "kumar": { t: "The Energetic Youth", d: "Aadha phal dene mein saksham. Ye grah kafi chanchal hai, life mein us sector mein ups and downs rahenge par growth continue hogi." },
    "yuva": { t: "The Absolute Ruler", d: "Sabse shubh position. Ye planet poori tarah 'awake' hai. Ise kisi support ki zaroorat nahi, ye khud kismat badalne ki shakti rakhta hai." },
    "vridh": { t: "The Wise Elder", d: "Experience bahut hai par kaam karne ki energy kam hai. Ye grah spirituality aur research ke liye best hai par worldly results mein delay karega." },
    "mrit": { t: "The Fading Echo", d: "Grah exit mode mein hai. Iska asar physical life mein mehsoos nahi hoga. Ise 'Jagrit' karne ke liye special gemstones aur mantras chahiye." }
};

function calculateVitality() {
    const sel = document.getElementById("degreeSelect");
    const val = sel.value;
    const power = sel.options[sel.selectedIndex].getAttribute('data-p');
    const info = degreeInfo[val];

    // UI Updates
    document.getElementById("powerFill").style.width = power + "%";
    document.getElementById("powerLabel").innerText = "Current Potency: " + power + "%";
    document.getElementById("percentBadge").innerText = power + "% Potential";
    document.getElementById("resTitle").innerText = info.t;
    document.getElementById("resDesc").innerText = info.d;
    
    document.getElementById("result").style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function saveProgress() {
    console.log("Firebase Ledger Update: 2026-03-05 - Degree Logic Applied");
    alert("Kamaal! Aapne Grahon ki umar pehchanna seekh liya hai. Data saved.");
}
</script>
</body>
</html>
