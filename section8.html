<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v9.0 | Varga Quantum</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #020617; --card: #1e293b; 
            --text: #f8fafc; --accent: #00ffcc; --varga-blue: #38bdf8;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        
        /* Quantum Header */
        .varga-header { 
            background: linear-gradient(135deg, #0f172a, #1e293b); padding: 30px; border-radius: 35px; 
            margin-bottom: 25px; border: 1px solid rgba(0, 255, 204, 0.2); text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .varga-header h1 { font-size: 20px; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        .lens-card { 
            background: var(--card); border-radius: 40px; padding: 30px; 
            border: 1px solid rgba(255, 215, 0, 0.1); position: relative;
        }

        .select-wrapper { margin-bottom: 25px; }
        label { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-left: 5px; }

        select { 
            width: 100%; padding: 18px; border-radius: 20px; background: #0f172a; color: white; 
            border: 1px solid #334155; font-size: 15px; outline: none; margin-top: 10px;
        }

        .btn-zoom { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 14px; 
            font-weight: 700; cursor: pointer; background: var(--gold); color: #000; 
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-zoom:hover { transform: scale(1.03); filter: brightness(1.1); }

        /* Varga Results */
        .varga-panel { margin-top: 35px; display: none; animation: quantumFade 0.6s ease; }
        .varga-meta { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .v-tag { font-size: 10px; font-weight: 700; background: rgba(0, 255, 204, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 8px; border: 1px solid var(--accent); }

        .varga-insight { 
            background: #0f172a; padding: 25px; border-radius: 30px; 
            border-bottom: 4px solid var(--gold);
        }
        .varga-insight h3 { margin: 0 0 10px 0; color: var(--gold); font-size: 18px; }
        .varga-insight p { margin: 0; font-size: 13.5px; line-height: 1.7; color: #cbd5e1; }

        @keyframes quantumFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="varga-header">
        <h1>Quantum Varga Lens</h1>
        <p style="font-size: 10px; color: #64748b; margin-top: 8px;">Firebase Sync: High-Res Analysis [2026-03-05]</p>
    </div>

    <div class="lens-card">
        <div class="select-wrapper">
            <label>Select Divisional Layer</label>
            <select id="vSelect" onchange="hideResult()">
                <option value="d1">D1: The Body (Physical Manifestation)</option>
                <option value="d9">D9: The Soul (Navamsha / Strength)</option>
                <option value="d10">D10: The Career (Dashamsha / Success)</option>
                <option value="d60">D60: The Karma (Past Life Verdict)</option>
            </select>
        </div>

        <button class="btn-zoom" onclick="revealVarga()">Reveal Secret Layer 🔍</button>

        <div id="result" class="varga-panel">
            <div class="varga-meta">
                <div class="v-tag" id="vType">LAYER: D1</div>
                <div class="v-tag" style="border-color:var(--gold); color:var(--gold);">HI-RES SCAN</div>
            </div>
            
            <div class="varga-insight">
                <h3 id="vTitle">Decoding...</h3>
                <p id="vDesc"></p>
            </div>
            
            <button class="btn-zoom" style="background: var(--accent); margin-top: 30px;" onclick="finalizeSync()">
                Commit Varga Data to Ledger 🏆
            </button>
        </div>
    </div>
</div>

<script>
const vargaDB = {
    "d1": { t: "The Physical Shell", type: "PHYSICAL", desc: "Ye aapka main blueprint hai. Duniya ko aap kaise dikhte hain aur aap kya achieve karenge, ye D1 tay karta hai. Par ye sirf 50% sachayi hai." },
    "d9": { t: "The Soul's Potency", type: "INTERNAL", desc: "Vedic Astrology ka sabse imp chart. Agar koi planet D1 mein weak hai par D9 mein strong, toh wo end mein aapko success zaroori dilayega. Ise 'Real Strength' kehte hain." },
    "d10": { t: "The Throne of Karma", type: "PROFESSIONAL", desc: "Sirf career ke liye. Career mein fame, authority aur power milegi ya nahi, ye D10 se confirm hota hai. Ye aapke 'Action' ka fal hai." },
    "d60": { t: "The Universal Ledger", type: "KARMIC", desc: "Ye sabse accurate chart hai. Maharishi Parashar ke mutabiq, ye chart batata hai ki aapne pichle janmo mein kya kiya hai aur is janam mein aapka destiny backup kitna hai." }
};

function revealVarga() {
    const val = document.getElementById("vSelect").value;
    const data = vargaDB[val];
    
    document.getElementById("vType").innerText = "LAYER: " + val.toUpperCase();
    document.getElementById("vTitle").innerText = data.t;
    document.getElementById("vDesc").innerText = data.desc;
    
    document.getElementById("result").style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function hideResult() {
    document.getElementById("result").style.display = "none";
}

function finalizeSync() {
    console.log("Firebase Ledger Update [2026-03-05]: Varga Analysis Mastered.");
    alert("Shabash! Aapne Varga charts ki complexity ko samajh liya hai. Final Course Data saved.");
}
</script>
</body>
</html>
