<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v3.3 | Conflict Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #05070a; --card: #111827; 
            --text: #f3f4f6; --safe: #10b981; --hazard: #ef4444;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; }
        
        /* Tactical Status Bar */
        .status-bar { display: flex; justify-content: space-between; font-size: 10px; color: #4b5563; margin-bottom: 15px; letter-spacing: 1px; font-weight: 700; }
        .secure-tag { color: var(--safe); border: 1px solid var(--safe); padding: 2px 6px; border-radius: 4px; }

        /* Synergy Card */
        .synergy-card { 
            background: var(--card); border-radius: 35px; padding: 28px; 
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        label { font-size: 10px; color: var(--gold); text-transform: uppercase; display: block; margin-bottom: 8px; }

        select { 
            width: 100%; padding: 14px; border-radius: 15px; background: #030712; color: white; 
            border: 1px solid #374151; font-size: 13px; outline: none;
        }

        .btn-check { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 13px; 
            font-weight: 700; cursor: pointer; text-transform: uppercase;
            background: linear-gradient(145deg, #1f2937, #111827);
            color: var(--gold); border: 1px solid var(--gold); transition: 0.2s;
        }
        .btn-check:active { transform: translateY(3px); filter: brightness(1.2); }

        /* Alert Panel */
        .alert-panel { margin-top: 25px; display: none; animation: slideIn 0.4s ease forwards; }
        .alert-chip { 
            background: rgba(255,255,255,0.02); padding: 20px; border-radius: 24px; 
            border-left: 4px solid var(--safe); position: relative;
        }
        .alert-chip b { display: block; font-size: 11px; text-transform: uppercase; margin-bottom: 5px; }
        .alert-chip p { margin: 0; font-size: 13.5px; line-height: 1.5; color: #cbd5e1; }

        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <div class="status-bar">
        <span>STREAMS: 3.3.1</span>
        <span class="secure-tag">ENCRYPTION: ON</span>
    </div>

    <div class="synergy-card" id="card">
        <h2 style="margin: 0 0 5px 0;">Compatibility Checker</h2>
        <p style="color: #6b7280; font-size: 13px; margin-bottom: 25px;">Check karein ki do grah ya ratna saath mein chalenge ya nahi.</p>
        
        <div class="input-row">
            <div>
                <label>Energy 1</label>
                <select id="e1">
                    <option value="Sun">Sun (Ruby) ☀️</option>
                    <option value="Moon">Moon (Pearl) 🌙</option>
                    <option value="Mars">Mars (Coral) 🔥</option>
                    <option value="Jupiter">Jupiter (Pukhraj) 🎓</option>
                </select>
            </div>
            <div>
                <label>Energy 2</label>
                <select id="e2">
                    <option value="Saturn">Saturn (Neelam) ⚖️</option>
                    <option value="Venus">Venus (Diamond) ✨</option>
                    <option value="Mercury">Mercury (Emerald) ✍️</option>
                    <option value="Mars">Mars (Coral) 🔥</option>
                </select>
            </div>
        </div>
        
        <button class="btn-check" onclick="runCheck()">Analyze Synergy ⚡</button>
        
        <div id="output" class="alert-panel">
            <div id="chip" class="alert-chip">
                <b id="status-title">System Analysis</b>
                <p id="status-desc"></p>
            </div>
        </div>
    </div>
</div>

<script>
const clashDB = {
    "Sun-Saturn": { s: "Hazardous", d: "Pita aur Putra ke beech ki dushmani. Sun (Aag) aur Saturn (Thand) ek saath clash karte hain. Energy blocks aur legal issues ho sakte hain.", c: "#ef4444" },
    "Sun-Venus": { s: "Incompatible", d: "Sun ki garmi Venus ki beauty ko burn kar deti hai (Combustion). Relationships aur luxury mein problems aa sakti hain.", c: "#fb923c" },
    "Moon-Mercury": { s: "Neutral-Weak", d: "Mercury Moon ko dushman maanta hai. Emotinal decision vs Logical decision ki jung chalegi. Confusion badh sakta hai.", c: "#fbbf24" },
    "Jupiter-Mars": { s: "Great Friends", d: "Guru-Mangal Yoga. Wisdom (Jupiter) aur Energy (Mars) ka perfect combo. Ye success aur protecton deta hai.", c: "#10b981" },
    "Jupiter-Mercury": { s: "Good Synergy", d: "Dono hi intelligence ke grah hain. Business aur teaching ke liye ye combination 'Mastermind' banata hai.", c: "#38bdf8" }
};

function runCheck() {
    const e1 = document.getElementById("e1").value;
    const e2 = document.getElementById("e2").value;
    const card = document.getElementById("card");
    const chip = document.getElementById("chip");
    const key = `${e1}-${e2}`;
    
    const data = clashDB[key] || { s: "Compatible", d: "Ye dono energies neutral hain. Inka saath mein hona safe hai aur koi bada side-effect nahi hoga.", c: "#10b981" };
    
    document.getElementById("status-title").innerText = `Status: ${data.s}`;
    document.getElementById("status-title").style.color = data.c;
    document.getElementById("status-desc").innerText = data.d;
    chip.style.borderColor = data.c;
    
    // UI Visual Feedback
    card.style.borderColor = data.c;
    card.style.boxShadow = `0 30px 60px -10px ${data.c}33`;
    
    document.getElementById("output").style.display = "block";
    
    // Firebase Security Log
    console.log(`Firebase: Analysis stored. Mode: ${data.s}`, { pair: key, timestamp: new Date() });
}
</script>
</body>
</html>
