<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v3.1 | Transit Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #030712; --card: #111827; 
            --text: #f3f4f6; --accent: #00ffcc; --transit: #fb7185;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; }
        
        /* Cloud Sync Header */
        .sync-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 10px; font-weight: 700; }
        .cloud-status { display: flex; align-items: center; gap: 5px; color: var(--accent); text-transform: uppercase; }
        .pulse-dot { height: 6px; width: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); } }

        /* Transit Dashboard */
        .master-card { 
            background: var(--card); border-radius: 35px; padding: 25px; 
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }

        .label-tag { font-size: 9px; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; display: block; letter-spacing: 1px; }

        /* Double Select Row */
        .transit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        select { width: 100%; padding: 12px; border-radius: 12px; background: #030712; color: white; border: 1px solid #374151; font-size: 13px; outline: none; }

        /* Progress Ticker */
        .ticker-wrap { background: #000; padding: 10px; border-radius: 10px; margin-top: 20px; overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; font-size: 11px; color: var(--accent); animation: scroll 15s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .btn-transit { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 13px; 
            font-weight: 700; cursor: pointer; background: var(--transit); color: white; 
            text-transform: uppercase; box-shadow: 0 8px 20px rgba(251, 113, 133, 0.3);
        }
        .btn-transit:active { transform: scale(0.97); }

        .output-box { margin-top: 25px; display: none; }
        .data-card { background: #1e293b; padding: 18px; border-radius: 20px; border-left: 4px solid var(--transit); animation: fadeIn 0.4s ease-in; }
        .data-card b { color: var(--transit); font-size: 11px; display: block; margin-bottom: 5px; }
        .data-card p { margin: 0; font-size: 13px; line-height: 1.5; color: #cbd5e1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="sync-header">
        <div class="cloud-status"><div class="pulse-dot"></div> Firebase Active</div>
        <div style="color: #64748b;">NODE v3.1.2</div>
    </div>

    <div class="master-card">
        <h2 style="margin:0 0 20px 0; font-weight: 600;">Transit Optimizer</h2>
        
        <span class="label-tag">Select Birth Planet</span>
        <div class="transit-row">
            <select id="birthP"><option value="Sun">Sun ☀️</option><option value="Saturn">Saturn ⚖️</option><option value="Jupiter">Jupiter 🎓</option></select>
            <select id="birthR"><option value="Aries">Aries</option><option value="Libra">Libra</option><option value="Pisces">Pisces</option></select>
        </div>

        <span class="label-tag" style="color: var(--transit);">Today's Transit Position</span>
        <div class="transit-row" style="border-color: var(--transit);">
            <select id="transP"><option value="Saturn">Saturn ⚖️</option><option value="Rahu">Rahu 🎭</option><option value="Mars">Mars 🔥</option></select>
            <select id="transR"><option value="Aries">Aries</option><option value="Aquarius">Aquarius</option><option value="Scorpio">Scorpio</option></select>
        </div>
        
        <button class="btn-transit" onclick="calculateTransit()">Check Transit Impact ⚡</button>
        
        <div id="result" class="output-box">
            <div class="data-card">
                <b>Transit Logic (Gochar)</b>
                <p id="impact-text"></p>
            </div>
        </div>

        <div class="ticker-wrap">
            <div class="ticker">
                SUN in PISCES 18° • MOON in LIBRA 04° • MARS in SCORPIO 22° • SATURN in AQUARIUS 15° • JUPITER in TAURUS 12°
            </div>
        </div>
    </div>
</div>

<script>
const transitEngine = {
    "Sun-Saturn-Aries": "Sade Sati Impact: Aapke birth Sun par Saturn ka transit ho raha hai. Emotional pressure aur career delays feel ho sakte hain. Patience rakhein.",
    "Jupiter-Mars-Pisces": "Expansion Peak: Jupiter ke upar se Mars ka transit energy ko boost karega. Naye business deals aur physical activity ke liye best time hai.",
    "Saturn-Rahu-Aquarius": "Chaos Alert: Saturn ke upar Rahu ka transit sudden changes aur confusion la sakta hai. Badi investment se bachein."
};

function calculateTransit() {
    const bP = document.getElementById("birthP").value;
    const tP = document.getElementById("transP").value;
    const tR = document.getElementById("transR").value;
    
    const key = `${bP}-${tP}-${tR}`;
    const resultText = transitEngine[key] || "Neutral Transit: Ye movement aapke birth planet ko disturb nahi kar rahi hai. Normal growth continue rahegi.";
    
    document.getElementById("impact-text").innerText = resultText;
    document.getElementById("result").style.display = "block";
    
    // Firebase Simulation
    console.log("Firebase: Transit log stored for user.", { key, time: new Date() });
}
</script>
</body>
</html>
