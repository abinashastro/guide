<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #010409; --card: #0d1117; 
            --text: #c9d1d9; --accent: #58a6ff; --fire: #ff7b72; --water: #79c0ff;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        
        /* Version Header */
        .v-header { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; color: #8b949e; letter-spacing: 2px; margin-bottom: 20px; }
        .badge { background: rgba(88, 166, 255, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--accent); }

        /* The Quantum Card */
        .q-card { 
            background: var(--card); border-radius: 30px; padding: 25px; 
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            position: relative; overflow: hidden;
        }

        .dropdown-box { background: #161b22; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #30363d; }
        label { font-size: 10px; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; display: block; }

        select { 
            width: 100%; padding: 14px; border-radius: 12px; background: #0d1117; color: white; 
            border: 1px solid #30363d; font-size: 15px; outline: none;
        }

        .btn-decode { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; font-size: 14px; 
            font-weight: 700; cursor: pointer; background: var(--gold); color: #000; 
            text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s;
        }
        .btn-decode:active { transform: scale(0.97); }

        /* Multi-Stage Result Panel */
        .meta-panel { margin-top: 30px; display: none; }
        
        .prop-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .prop-item { background: #161b22; padding: 12px; border-radius: 15px; text-align: center; border: 1px solid #30363d; }
        .prop-item span { display: block; font-size: 9px; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; }
        .prop-item b { font-size: 12px; color: var(--accent); }

        .analysis-box { 
            background: rgba(255,255,255,0.02); padding: 20px; border-radius: 22px; 
            border-left: 5px solid var(--accent); animation: slideRight 0.5s ease;
        }
        .analysis-box b { color: var(--gold); display: block; font-size: 11px; text-transform: uppercase; margin-bottom: 6px; }
        .analysis-box p { margin: 0; font-size: 14px; line-height: 1.6; color: #f0f6fc; }

        @keyframes slideRight { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="v-header"><span>ASTRO-OS v4.0</span> <span class="badge">LOGIC CORE</span></div>

    <div class="q-card" id="main-frame">
        <h2 style="margin:0 0 5px 0; color:#fff;">Rashi Blueprint</h2>
        <p style="color:#8b949e; font-size: 13px; margin-bottom: 25px;">Understand the fundamental DNA of the sign.</p>
        
        <div class="dropdown-box">
            <label>Select Sign (Rashi)</label>
            <select id="rashiInput">
                <option value="Aries" data-e="Fire" data-m="Moveable" data-p="Masculine">Aries (Mesh) ♈</option>
                <option value="Taurus" data-e="Earth" data-m="Fixed" data-p="Feminine">Taurus (Vrish) ♉</option>
                <option value="Gemini" data-e="Air" data-m="Dual" data-p="Masculine">Gemini (Mithun) ♊</option>
                <option value="Cancer" data-e="Water" data-m="Moveable" data-p="Feminine">Cancer (Karka) ♋</option>
                <option value="Leo" data-e="Fire" data-m="Fixed" data-p="Masculine">Leo (Simha) ♌</option>
                <option value="Virgo" data-e="Earth" data-m="Dual" data-p="Feminine">Virgo (Kanya) ♍</option>
            </select>
        </div>
        
        <button class="btn-decode" onclick="decodeRashi()">Decode DNA 🧬</button>
        
        <div id="metaPanel" class="meta-panel">
            <div class="prop-grid">
                <div class="prop-item"><span>Element</span><b id="elText"></b></div>
                <div class="prop-item"><span>Modality</span><b id="moText"></b></div>
                <div class="prop-item"><span>Polarity</span><b id="poText"></b></div>
            </div>
            
            <div class="analysis-box">
                <b>Behavioral Logic</b>
                <p id="logicText"></p>
            </div>
        </div>
    </div>
</div>

<script>
const behaviorDB = {
    "Aries": "Fire + Moveable: Ye ek 'Wildfire' ki tarah hai jo turant failti hai. Isi liye Aries log initiate karne mein sabse aage hote hain.",
    "Taurus": "Earth + Fixed: Ye ek 'Mountain' ki tarah hai. Stability aur security inka core hai, inhein badlav pasand nahi hota.",
    "Gemini": "Air + Dual: Ye ek 'Breeze' ki tarah hai jo har direction mein mud sakti hai. Information gather karna inka DNA hai.",
    "Cancer": "Water + Moveable: Ye 'River' ki tarah hai. Emotions ka flow hamesha move karta rehta hai, par rasta nahi badalta.",
    "Leo": "Fire + Fixed: Ye ek 'Burning Lamp' ki tarah hai. Consistent energy aur authority. Inka glow kabhi kam nahi hota.",
    "Virgo": "Earth + Dual: Ye 'Productive Soil' ki tarah hai. Har cheez ko analyze karke usse useful banana inki takat hai."
};

function decodeRashi() {
    const sel = document.getElementById("rashiInput");
    const val = sel.value;
    const opt = sel.options[sel.selectedIndex];
    
    document.getElementById("elText").innerText = opt.getAttribute('data-e');
    document.getElementById("moText").innerText = opt.getAttribute('data-m');
    document.getElementById("poText").innerText = opt.getAttribute('data-p');
    document.getElementById("logicText").innerText = behaviorDB[val];
    
    document.getElementById("metaPanel").style.display = "block";
    
    // UI Color Sync
    const elementColors = { Fire: "#ff7b72", Earth: "#d29922", Air: "#58a6ff", Water: "#a5d6ff" };
    document.documentElement.style.setProperty('--accent', elementColors[opt.getAttribute('data-e')]);
}
</script>
</body>
</html>
