<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v6.0 | Yoga Alchemy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #0a0a0c; --card: #16161d; 
            --text: #e2e8f0; --accent: #f43f5e; --yoga: #38bdf8;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 11px; color: #64748b; letter-spacing: 1px; }

        /* The Alchemy Card */
        .alchemy-card { 
            background: var(--card); border-radius: 35px; padding: 30px; 
            border: 1px solid rgba(244, 63, 94, 0.2); box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative; overflow: hidden;
        }

        .vs-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 25px; background: #000; padding: 20px; border-radius: 25px; border: 1px solid #27272a; }
        .p-icon { font-size: 32px; filter: drop-shadow(0 0 10px var(--gold)); }
        .vs-text { font-style: italic; font-weight: 800; color: var(--accent); font-size: 18px; }

        select { 
            width: 100%; padding: 18px; border-radius: 20px; background: #27272a; color: white; 
            border: 1px solid #3f3f46; font-size: 15px; outline: none; margin-bottom: 20px;
        }

        .btn-fuse { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; font-size: 14px; 
            font-weight: 700; cursor: pointer; background: linear-gradient(90deg, var(--gold), #fbbf24); 
            color: #000; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Result Panel */
        .yoga-panel { margin-top: 30px; display: none; animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .yoga-type { background: rgba(56, 189, 248, 0.1); color: var(--yoga); padding: 8px 15px; border-radius: 12px; font-size: 10px; font-weight: 700; display: inline-block; margin-bottom: 15px; border: 1px solid var(--yoga); }

        .impact-box { 
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; 
            border-bottom: 4px solid var(--gold);
        }
        .impact-box h3 { margin: 0 0 10px 0; font-size: 18px; color: var(--gold); }
        .impact-box p { margin: 0; font-size: 14px; line-height: 1.7; color: #94a3b8; }

        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header"><span>ASTRO-CORE v6.0</span> <span>BATTLE-READY</span></div>

    <div class="alchemy-card">
        <div class="vs-container">
            <span id="p1" class="p-icon">☀️</span>
            <span class="vs-text">VS</span>
            <span id="p2" class="p-icon">🌑</span>
        </div>

        <select id="yogaSelect" onchange="updateIcons()">
            <option value="sun_mercury" data-p1="☀️" data-p2="☿️">Sun + Mercury (Intelligence)</option>
            <option value="moon_jupiter" data-p1="🌙" data-p2="♃">Moon + Jupiter (Fortune)</option>
            <option value="saturn_rahu" data-p1="🪐" data-p2="🐲">Saturn + Rahu (Chaos)</option>
            <option value="mars_venus" data-p1="♂️" data-p2="♀️">Mars + Venus (Passion)</option>
        </select>

        <button class="btn-fuse" onclick="fusePlanets()">Fuse Energies ⚡</button>

        <div id="result" class="yoga-panel">
            <div class="yoga-type" id="yType">Dhana Yoga</div>
            <div class="impact-box">
                <h3 id="yTitle">Yoga Resultant</h3>
                <p id="yDesc"></p>
            </div>
            <p style="font-size: 10px; color: #64748b; margin-top: 15px; text-align: center;">Firebase Sync: Status Active [2026-03-05]</p>
        </div>
    </div>
</div>

<script>
const yogaDB = {
    "sun_mercury": { t: "Budh-Aditya", type: "Raja Yoga (Success)", desc: "Jab Surya ki power aur Budh ka logic milte hain, toh dimaag computer ki tarah chalta hai. Aap mushkil se mushkil business deal seconds mein solve kar sakte hain." },
    "moon_jupiter": { t: "Gaj-Kesari", type: "Dhana Yoga (Wealth)", desc: "Ye haathi aur sher ki jodi hai. Aapka mann shant rehta hai aur aapki kismat aapko hamesha amiri aur izzat ki taraf dhakelti hai." },
    "saturn_rahu": { t: "Shrapit Yoga", type: "Karmic Yoga (Trial)", desc: "Ye 'Wild Energy' hai. Aapko life mein sab kuch late milega, par jab milega toh wo itna bada hoga ki duniya dekhti reh jayegi. Resilience is your key." },
    "mars_venus": { t: "Passion Union", type: "Kama Yoga (Desire)", desc: "Energy aur Beauty ka milap. Aap jo bhi creative kaam karenge usme log aapke deewane ho jayenge. Par isme gussa control karna zaroori hai." }
};

function updateIcons() {
    const sel = document.getElementById("yogaSelect");
    const opt = sel.options[sel.selectedIndex];
    document.getElementById("p1").innerText = opt.getAttribute('data-p1');
    document.getElementById("p2").innerText = opt.getAttribute('data-p2');
    document.getElementById("result").style.display = "none";
}

function fusePlanets() {
    const val = document.getElementById("yogaSelect").value;
    const data = yogaDB[val];
    
    document.getElementById("yType").innerText = data.type;
    document.getElementById("yTitle").innerText = data.t;
    document.getElementById("yDesc").innerText = data.desc;
    
    document.getElementById("result").style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
