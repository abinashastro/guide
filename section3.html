<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy v4.1 | Pada Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd700; --bg: #02040a; --card: #0f172a; 
            --text: #f1f5f9; --accent: #8b5cf6; --success: #10b981;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 460px; }
        
        /* Progress Orbit */
        .orbit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .token-display { background: rgba(139, 92, 246, 0.1); border: 1px solid var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 10px; color: var(--accent); font-weight: 700; }

        /* The Star Card */
        .star-card { 
            background: var(--card); border-radius: 35px; padding: 30px; 
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .select-cluster { background: #1e293b; padding: 20px; border-radius: 25px; margin-bottom: 20px; }
        label { font-size: 10px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1px; }

        select { 
            width: 100%; padding: 15px; border-radius: 15px; background: #0f172a; color: white; 
            border: 1px solid #334155; font-size: 14px; outline: none; margin-bottom: 15px;
        }

        .btn-reveal { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 13px; 
            font-weight: 700; cursor: pointer; background: var(--gold); color: #000; 
            text-transform: uppercase; box-shadow: 0 10px 20px rgba(255, 215, 0, 0.15);
        }

        /* Result Mapping */
        .map-panel { margin-top: 30px; display: none; }
        .pada-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .pada-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .pada-box span { font-size: 9px; color: #94a3b8; display: block; margin-bottom: 5px; }
        .pada-box b { font-size: 13px; color: var(--gold); }

        .soul-insight { 
            background: linear-gradient(145deg, #1e293b, #0f172a); padding: 20px; 
            border-radius: 25px; border-left: 4px solid var(--accent); animation: fadeIn 0.6s ease;
        }
        .soul-insight b { color: var(--accent); display: block; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }
        .soul-insight p { margin: 0; font-size: 14px; line-height: 1.6; color: #cbd5e1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="orbit-header">
        <span style="font-size: 12px; font-weight: 600; color: #64748b;">ASTRO-SYNC v4.1</span>
        <div class="token-display">FIREBASE: TOKEN_SAVED</div>
    </div>

    <div class="star-card">
        <h2 style="margin:0 0 5px 0;">Nakshatra Pada</h2>
        <p style="color:#94a3b8; font-size: 13px; margin-bottom: 25px;">Go deeper into the 4 stages of your destiny.</p>
        
        <div class="select-cluster">
            <label>Choose Nakshatra</label>
            <select id="nakSelect">
                <option value="Ashwini">Ashwini 🐎</option>
                <option value="Rohini">Rohini 🌳</option>
                <option value="Magha">Magha 👑</option>
                <option value="Pushya">Pushya 🌸</option>
            </select>

            <label>Choose Pada (Quarter)</label>
            <select id="padaSelect">
                <option value="1">Pada 1 (Dharma)</option>
                <option value="2">Pada 2 (Artha)</option>
                <option value="3">Pada 3 (Kama)</option>
                <option value="4">Pada 4 (Moksha)</option>
            </select>
        </div>
        
        <button class="btn-reveal" onclick="mapDestiny()">Map Soul Goal 🔮</button>
        
        <div id="result" class="map-panel">
            <div class="pada-grid">
                <div class="pada-box"><span>Navamsha</span><b id="navText"></b></div>
                <div class="pada-box"><span>Motivation</span><b id="motText"></b></div>
            </div>
            
            <div class="soul-insight">
                <b>Deep Analysis</b>
                <p id="descText"></p>
            </div>
        </div>
    </div>
</div>

<script>
const padaData = {
    "Ashwini-1": {nav: "Aries", mot: "Dharma", desc: "Aapka goal life mein sahi rasta dhoondna hai. Aap ek pioneer hain jo doosron ke liye misal bante hain."},
    "Ashwini-2": {nav: "Taurus", mot: "Artha", desc: "Aap apne skills ko paison aur security mein badalne mein mahir hain. Practicality aapki takat hai."},
    "Rohini-4": {nav: "Cancer", mot: "Moksha", desc: "Aapka connection emotions aur spirituality se bahut gehra hai. Aap doosron ko healing dete hain."},
    "Pushya-2": {nav: "Virgo", mot: "Artha", desc: "Intelligence aur service aapka main motive hai. Aap perfection ke sath wealth create karte hain."}
};

function mapDestiny() {
    const nak = document.getElementById("nakSelect").value;
    const pada = document.getElementById("padaSelect").value;
    const key = `${nak}-${pada}`;
    
    const data = padaData[key] || {nav: "Calculated", mot: "Evolution", desc: "Is pada mein aapka focus self-development aur learning par rehte hai. Aap life ke flow ke sath move karte hain."};
    
    document.getElementById("navText").innerText = data.nav;
    document.getElementById("motText").innerText = data.mot;
    document.getElementById("descText").innerText = data.desc;
    
    document.getElementById("result").style.display = "block";
    
    // Simulate Firebase Update
    console.log(`Firebase: User Progress Updated for ${key}. Timestamp: ${new Date().toISOString()}`);
}
</script>
</body>
</html>
